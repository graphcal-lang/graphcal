name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: allow
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features

      - name: Clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features

      - name: Rustfmt
        run: cargo fmt --check

      - name: Doc
        env:
          RUSTDOCFLAGS: "-Dwarnings"
        run: cargo doc --workspace --no-deps

      - name: Check
        run: cargo check --workspace

      - name: Verify no uncommitted changes
        run: git diff --exit-code

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

  msrv:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "" # Override global -Dwarnings for MSRV check
    steps:
      - uses: actions/checkout@v6

      - uses: taiki-e/install-action@cargo-hack

      - name: Check MSRV
        run: cargo hack check --workspace --rust-version --ignore-private

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: crate-ci/typos@v1.45.0

  collect:
    needs: [checks, test, coverage, msrv, typos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.checks.result }}" "${{ needs.test.result }}" "${{ needs.coverage.result }}" "${{ needs.msrv.result }}" "${{ needs.typos.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" ]]; then
              echo "One or more jobs failed"
              exit 1
            fi
          done
          echo "All jobs passed"
