name: Documentation

# Disabled for now (project is private).
# To enable automatic deployment, change `on:` to:
#   on:
#     push:
#       branches:
#         - main
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean
      - uses: actions/upload-artifact@v6
        with:
          name: docs-site
          path: site

